<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" fill="none" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1224"/>
      <stop offset="45%" stop-color="#122a5c"/>
      <stop offset="100%" stop-color="#1a3f8f"/>
    </linearGradient>
    <linearGradient id="glow-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#60a5fa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="beam" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#93c5fd" stop-opacity="0"/>
      <stop offset="50%" stop-color="#93c5fd" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#93c5fd" stop-opacity="0"/>
    </linearGradient>
    <pattern id="hex" width="56" height="48" patternUnits="userSpaceOnUse" patternTransform="scale(1.2)">
      <path d="M28 2 L52 15 L52 41 L28 54 L4 41 L4 15 Z" stroke="rgba(147,197,253,0.07)" stroke-width="1" fill="none"/>
    </pattern>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
    </pattern>
    <filter id="blur-lg" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1920" height="1080" fill="url(#bg)"/>
  <rect width="1920" height="1080" fill="url(#hex)"/>
  <rect width="1920" height="1080" fill="url(#grid)" opacity="0.6"/>

  <ellipse cx="1550" cy="280" rx="420" ry="280" fill="url(#glow-blue)" filter="url(#blur-lg)" opacity="0.7"/>
  <ellipse cx="320" cy="780" rx="360" ry="240" fill="#2563eb" filter="url(#blur-lg)" opacity="0.18"/>
  <ellipse cx="960" cy="120" rx="500" ry="180" fill="#1d4ed8" filter="url(#blur-lg)" opacity="0.12"/>

  <g stroke="rgba(147,197,253,0.18)" stroke-width="1.5" fill="none">
    <path d="M0 420 H280 L360 360 H620 L700 420 H980 L1060 340 H1320 L1400 400 H1920"/>
    <path d="M0 620 H200 L300 560 H540 L640 640 H900 L1000 580 H1280 L1380 660 H1920"/>
    <path d="M0 820 H160 L260 760 H480 L580 840 H860 L960 780 H1200 L1300 860 H1920"/>
    <path d="M420 0 V180 L500 260 V1080" opacity="0.5"/>
    <path d="M1180 0 V220 L1260 300 V1080" opacity="0.5"/>
    <path d="M1580 0 V160 L1660 240 V1080" opacity="0.35"/>
  </g>

  <rect x="0" y="395" width="1920" height="2" fill="url(#beam)" opacity="0.8"/>
  <rect x="0" y="598" width="1920" height="1.5" fill="url(#beam)" opacity="0.5"/>
  <rect x="0" y="798" width="1920" height="1" fill="url(#beam)" opacity="0.35"/>

  <g filter="url(#glow-sm)">
    <circle cx="360" cy="360" r="5" fill="#93c5fd"/>
    <circle cx="700" cy="420" r="4" fill="#60a5fa"/>
    <circle cx="1060" cy="340" r="6" fill="#bfdbfe"/>
    <circle cx="1400" cy="400" r="5" fill="#93c5fd"/>
    <circle cx="300" cy="560" r="4" fill="#60a5fa"/>
    <circle cx="640" cy="640" r="5" fill="#93c5fd"/>
    <circle cx="1000" cy="580" r="4" fill="#60a5fa"/>
    <circle cx="1380" cy="660" r="5" fill="#bfdbfe"/>
    <circle cx="500" cy="260" r="3.5" fill="#93c5fd" opacity="0.8"/>
    <circle cx="1260" cy="300" r="3.5" fill="#93c5fd" opacity="0.8"/>
  </g>

  <g opacity="0.22">
    <rect x="1420" y="180" width="120" height="280" rx="8" stroke="rgba(191,219,254,0.5)" stroke-width="1.5" fill="rgba(37,99,235,0.15)"/>
    <rect x="1440" y="210" width="80" height="18" rx="3" fill="rgba(147,197,253,0.25)"/>
    <rect x="1440" y="242" width="80" height="18" rx="3" fill="rgba(147,197,253,0.18)"/>
    <rect x="1440" y="274" width="80" height="18" rx="3" fill="rgba(147,197,253,0.22)"/>
    <rect x="1440" y="306" width="80" height="18" rx="3" fill="rgba(147,197,253,0.15)"/>
    <rect x="1440" y="338" width="80" height="18" rx="3" fill="rgba(147,197,253,0.2)"/>
    <rect x="1580" y="240" width="100" height="220" rx="8" stroke="rgba(191,219,254,0.35)" stroke-width="1.5" fill="rgba(29,78,216,0.12)"/>
    <rect x="1600" y="268" width="60" height="14" rx="2" fill="rgba(147,197,253,0.2)"/>
    <rect x="1600" y="294" width="60" height="14" rx="2" fill="rgba(147,197,253,0.15)"/>
    <rect x="1600" y="320" width="60" height="14" rx="2" fill="rgba(147,197,253,0.18)"/>
  </g>

  <g stroke="rgba(96,165,250,0.25)" stroke-width="1" fill="none">
    <path d="M80 200 C200 280, 280 320, 420 380"/>
    <path d="M60 320 C180 400, 260 440, 400 500"/>
    <path d="M100 480 C220 560, 300 600, 440 660"/>
    <path d="M140 640 C260 720, 340 760, 480 820"/>
  </g>

  <rect x="0" y="700" width="1920" height="380" fill="url(#bg)" opacity="0.45"/>
  <rect x="0" y="0" width="1920" height="1080" fill="url(#bg)" opacity="0.15"/>
</svg>
